name: Test

on:
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements-dev.txt

      - name: Install lint dependencies
        run: pip install ruff

      - name: Lint check (ruff)
        run: ruff check server/ mlops/ --output-format=github

      - name: Format check (ruff format)
        run: ruff format --check server/ mlops/

  test-server:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: scifiitsync_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r server/requirements-dev.txt

      - name: Run DB migrations
        run: cd server && alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/scifiitsync_test

      - name: Run server tests
        run: |
          pytest server/tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing
        env:
          PYTHONPATH: server
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/scifiitsync_test
          JWT_SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          JWT_ALGORITHM: HS256
          CHROMA_PERSIST_PATH: /tmp/chroma-test-data
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ci-mock-key
          OPENAI_API_KEY: ci-mock-key
          KAKAO_REST_API_KEY: ci-mock-key
          RATE_LIMIT_ENABLED: "false"
          ENV: test

  test-mlops:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: mlops/requirements.txt

      - name: Install mlops dependencies
        run: pip install -r mlops/requirements.txt

      - name: Run mlops tests
        run: pytest mlops/tests/ -v --tb=short
        env:
          PYTHONPATH: .
