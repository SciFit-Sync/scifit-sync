name: MLOps Paper Pipeline

on:
  schedule:
    - cron: '0 2 1 * *'   # 매월 1일 오전 2시 UTC (한국 오전 11시)
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: read
  issues: write   # 실패 시 이슈 자동 생성

concurrency:
  group: mlops-cron
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: mlops/requirements.txt

      - name: Install dependencies
        run: pip install -r mlops/requirements.txt

      - name: Run monthly paper ingestion pipeline
        run: python mlops/scripts/monthly_ingest.py
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}

      - name: Report success
        if: success()
        run: echo "✅ 논문 파이프라인 완료"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[mlops] 월간 논문 파이프라인 실패 (${today})`,
              body: [
                `매월 1회 도는 \`mlops.yml\` cron이 실패했습니다.`,
                ``,
                `- Run URL: ${url}`,
                `- Trigger: ${context.eventName}`,
                `- SHA: ${context.sha}`,
                ``,
                `로그 확인 후 원인 대응 부탁드립니다. (\`gh run view ${context.runId} --log-failed\`)`
              ].join('\n'),
              labels: ['mlops', 'ci-failure']
            });
