name: Bootstrap ECR Image

# 단계 12 부트스트랩 워크플로우.
# ECR에 첫 이미지를 올려서 단계 14 Task Definition이 참조할 수 있게 한다.
# deploy.yml이 main 푸시로 정상 동작하기 시작하면 이 파일은 삭제해도 무방
# (필요 시 수동 재빌드 유틸리티로 남겨도 됨).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '이미지 태그 (기본: bootstrap). latest 태그도 함께 푸시됨.'
        required: false
        default: 'bootstrap'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (linux/amd64)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.tag }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            server/
          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
