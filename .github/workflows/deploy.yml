name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # 코드 변경 없이 수동 재배포 / 일회성 reseed (Actions UI에서 "Run workflow")
    inputs:
      allow_clean_slate_wipe:
        description: "일회성 clean_slate reseed 허용 (prod 사용자데이터 wipe). 평상시 false 유지 — true는 백업+승인 하에만."
        type: boolean
        default: false

# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID      — IAM 사용자 액세스 키
#   AWS_SECRET_ACCESS_KEY  — IAM 사용자 시크릿 키
#   AWS_REGION             — 리전 (예: ap-northeast-2)
#   ECR_REPOSITORY         — ECR 저장소 이름 (예: scifit-sync)
#   ECS_CLUSTER            — ECS 클러스터 이름
#   ECS_SERVICE            — ECS 서비스 이름
#   ECS_TASK_DEFINITION    — Task Definition 패밀리 이름
#   CONTAINER_NAME         — 컨테이너 이름 (Task Def 내 name 필드)
#   ECS_SUBNET_IDS         — Fargate 마이그레이션 태스크 서브넷 ID (단일)
#   ECS_SG_IDS             — 마이그레이션 태스크 보안 그룹 ID

permissions:
  contents: read
  id-token: write   # 데모 1주 전 OIDC 전환 대비

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 무거운 reseed 마이그(>10분) 대응 헤드룸
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build context는 repo root — server/ + mlops/data 둘 다 컨테이너에 포함
          # (Alembic seed migration이 mlops/data/equipments_seed.csv 읽음)
          docker build -f server/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --query taskDefinition > task-definition.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Register new task definition revision
        id: register-task-def
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered task definition: $NEW_ARN"

      - name: Backup prod DB before migrations (pg_dump → S3)
        # 파괴적 마이그(clean_slate 전체 wipe 등) 자동 적용 전 사용자 데이터 백업.
        # PROD_DATABASE_URL(=pg_dump 가능한 direct 연결, transaction pooler 아님) + BACKUP_S3_URI
        # 두 secret 설정 시 활성화. 미설정(pre-launch)이면 백업할 데이터가 없으므로 경고 후 skip.
        # 🔴 실사용자 발생(출시) 후엔 두 secret 을 반드시 등록할 것 — 백업 없는 파괴적 마이그 금지.
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          BACKUP_S3_URI: ${{ secrets.BACKUP_S3_URI }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_DATABASE_URL:-}" ] || [ -z "${BACKUP_S3_URI:-}" ]; then
            echo "::warning::PROD_DATABASE_URL/BACKUP_S3_URI 미설정 — DB 백업 skip. pre-launch면 무방하나 출시 후엔 필수(파괴적 마이그 전 백업)."
            exit 0
          fi
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          DUMP="prod-backup-${{ github.sha }}-$TS.sql.gz"
          echo "Dumping prod DB → $DUMP (pg_dump via postgres:15 컨테이너로 버전 정합)"
          docker run --rm -e PGURL="$PROD_DATABASE_URL" postgres:17 \
            sh -c 'pg_dump --no-owner --no-privileges "$PGURL"' | gzip > "$DUMP"
          SIZE=$(stat -c%s "$DUMP")
          [ "$SIZE" -gt 100 ] || { echo "백업 파일이 비정상(${SIZE}B) — 마이그 중단"; exit 1; }
          aws s3 cp "$DUMP" "$BACKUP_S3_URI/$DUMP"
          echo "Backup uploaded: $BACKUP_S3_URI/$DUMP ($SIZE bytes)"

      - name: Run DB migrations (ECS Fargate one-off task)
        run: |
          # ALLOW_CLEAN_SLATE_WIPE: push(상시 배포)에선 항상 빈값(가드 활성). workflow_dispatch + allow_clean_slate_wipe=true 일 때만 '1'.
          WIPE="${{ (github.event_name == 'workflow_dispatch' && inputs.allow_clean_slate_wipe) && '1' || '' }}"
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition ${{ steps.register-task-def.outputs.arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SG_IDS }}],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"${{ secrets.CONTAINER_NAME }}\",\"command\":[\"sh\",\"-c\",\"alembic upgrade head\"],\"environment\":[{\"name\":\"ALLOW_CLEAN_SLATE_WIPE\",\"value\":\"$WIPE\"}]}]}" \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"

          # 마이그 태스크 종료 대기 — 무거운 reseed(>10분) 대응: aws ecs wait(고정 ~10분 한계) 대신 자체 폴링(최대 ~25분).
          STATUS=""
          for _ in $(seq 1 75); do
            STATUS=$(aws ecs describe-tasks --cluster ${{ secrets.ECS_CLUSTER }} --tasks "$TASK_ARN" --query 'tasks[0].lastStatus' --output text)
            [ "$STATUS" = "STOPPED" ] && break
            sleep 20
          done
          [ "$STATUS" = "STOPPED" ] || { echo "Migration task가 시간 내 종료되지 않음 (last status=$STATUS)"; exit 1; }

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          [ "$EXIT_CODE" = "0" ] || { echo "Migration failed (exit=$EXIT_CODE)"; exit 1; }
          echo "Migration succeeded."

      - name: Update ECS service with new task definition
        # ChromaDB는 인프로세스 단일 프로세스 전용이라 task가 동시에 2개 이상 뜨면
        # /chroma-data 동시 쓰기로 데이터 충돌이 발생함. 콘솔에서 실수로 desiredCount를
        # 올려도 다음 배포 때 1로 강제 복구되도록 매 배포마다 명시.
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --task-definition ${{ steps.register-task-def.outputs.arn }} \
            --desired-count 1 \
            --no-cli-pager

          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }}

          echo "Deployment complete."
