services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - chroma_data:/chroma-data
    env_file: ./server/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/scifiitsync
    depends_on:
      - db
    command: sh -c "alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scifiitsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  chroma_data:
  pg_data:
